name: Check fixture odds

on:
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    env:
      ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
      ODDSPAPI_TOURNAMENT_ID: ${{ secrets.ODDSPAPI_TOURNAMENT_ID != '' && secrets.ODDSPAPI_TOURNAMENT_ID || '16' }}
      ODDSPAPI_BOOKMAKER: pinnacle
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: pip install -r requirements.txt
      - name: Check Australia-Turkey and Germany-Curaçao
        run: |
          python scripts/check_fixture_odds.py \
            --home Australia --away Turkey \
            --home Germany --away Curaçao

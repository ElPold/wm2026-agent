name: Kicktipp Spieltag 1

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install kicktipp-agent CLI
        run: |
          git clone --depth 1 --branch v1.0.0 https://github.com/christianheidorn/kicktipp-agent.git .kicktipp-agent
          python scripts/patch_kicktipp_agent.py .kicktipp-agent
          cd .kicktipp-agent
          npm install
          npm run build
          npx playwright install chromium --with-deps

      - name: Validate Kicktipp secrets
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
        run: |
          missing=0
          for name in KICKTIPP_EMAIL KICKTIPP_PASSWORD KICKTIPP_COMMUNITY; do
            if [ -z "${!name}" ]; then
              echo "::error::Repository-Secret $name fehlt (Settings → Secrets and variables → Actions)."
              missing=1
            fi
          done
          exit $missing

      - name: Submit tips to Kicktipp (Spieltag 1)
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
          KICKTIPP_LOCALE: de
          KICKTIPP_BIN: ${{ github.workspace }}/.kicktipp-agent/dist/index.js
          KICKTIPP_AGENT_ROOT: ${{ github.workspace }}/.kicktipp-agent
        run: python scripts/submit_kicktipp.py --no-bonus --kicktipp-spieltag 1

name: Update predictions

on:
  workflow_dispatch:
    inputs:
      round:
        description: 'Spieltag/Runde, z. B. "Matchday 1". Empty = Matchday 1'
        required: false
        type: string
      submit_kicktipp:
        description: 'Tipps nach Kicktipp übertragen (kicktipp-agent CLI, braucht KICKTIPP_* Secrets)'
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
      ODDSPAPI_TOURNAMENT_ID: ${{ secrets.ODDSPAPI_TOURNAMENT_ID != '' && secrets.ODDSPAPI_TOURNAMENT_ID || '16' }}
      ODDSPAPI_BOOKMAKER: pinnacle
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate API secrets
        run: |
          if [ -z "$ODDSPAPI_API_KEY" ] && [ -z "$THE_ODDS_API_KEY" ]; then
            echo "::error::Keine Quoten-API konfiguriert. Bitte Repository-Secret ODDSPAPI_API_KEY setzen (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          if [ -z "$ODDSPAPI_API_KEY" ]; then
            echo "Hinweis: ODDSPAPI_API_KEY fehlt — nutze nur THE_ODDS_API_KEY als Fallback."
          else
            echo "OddsPapi-Key vorhanden (Tournament ID: ${ODDSPAPI_TOURNAMENT_ID})."
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate tips for upcoming matches
        run: |
          ROUND="${{ inputs.round }}"
          if [ -z "$ROUND" ]; then
            ROUND="Matchday 1"
          fi
          python run.py --round "$ROUND" --skip-started

      - uses: actions/setup-node@v4
        if: inputs.submit_kicktipp == true
        with:
          node-version: "22"

      - name: Install kicktipp-agent CLI
        if: inputs.submit_kicktipp == true
        run: |
          git clone --depth 1 --branch v1.0.0 https://github.com/christianheidorn/kicktipp-agent.git .kicktipp-agent
          cd .kicktipp-agent
          npm install
          npm run build
          npx playwright install chromium --with-deps

      - name: Validate Kicktipp secrets
        if: inputs.submit_kicktipp == true
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
        run: |
          missing=0
          for name in KICKTIPP_EMAIL KICKTIPP_PASSWORD KICKTIPP_COMMUNITY; do
            if [ -z "${!name}" ]; then
              echo "::error::Repository-Secret $name fehlt (Settings → Secrets and variables → Actions)."
              missing=1
            fi
          done
          exit $missing

      - name: Submit tips to Kicktipp
        if: inputs.submit_kicktipp == true
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
          KICKTIPP_BIN: ${{ github.workspace }}/.kicktipp-agent/dist/index.js
        run: python scripts/submit_kicktipp.py

      - name: Commit updated site and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update predictions $(TZ=Europe/Berlin date +%d.%m.)"
          git push

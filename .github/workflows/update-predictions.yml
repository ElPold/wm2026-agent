name: Update predictions

on:
  workflow_dispatch:
    inputs:
      date:
        description: "Matchday date (YYYY-MM-DD, Berlin). Empty = today"
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate tips for upcoming matches
        env:
          ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
          ODDSPAPI_TOURNAMENT_ID: ${{ secrets.ODDSPAPI_TOURNAMENT_ID }}
          THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
        run: |
          DATE="${{ inputs.date }}"
          if [ -z "$DATE" ]; then
            DATE=$(TZ=Europe/Berlin date +%Y-%m-%d)
          fi
          python run.py --date "$DATE" --skip-started

      - name: Commit updated site and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update predictions $(TZ=Europe/Berlin date +%d.%m.)"
          git push

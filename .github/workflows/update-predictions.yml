name: Update predictions

on:
  schedule:
    # 10:00 und 16:00 MESZ — Tipps aktualisieren und an Kicktipp übertragen
    - cron: "0 8 * * *"
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      round:
        description: 'Einzelne Runde, z. B. "Matchday 1". Leer = alle Runden (--all-rounds)'
        required: false
        type: string
      submit_kicktipp:
        description: 'Tipps nach Kicktipp übertragen (kicktipp-agent CLI, braucht KICKTIPP_* Secrets)'
        required: false
        type: boolean
        default: false
      kicktipp_spieltag:
        description: 'Kicktipp-Spieltag direkt (z.B. 1). Lädt Agent-Matchdays 1–3 aus state/history, überspringt Tipp-Generierung.'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
      ODDSPAPI_TOURNAMENT_ID: ${{ secrets.ODDSPAPI_TOURNAMENT_ID != '' && secrets.ODDSPAPI_TOURNAMENT_ID || '16' }}
      ODDSPAPI_BOOKMAKER: pinnacle
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate API secrets
        run: |
          if [ -z "$ODDSPAPI_API_KEY" ] && [ -z "$THE_ODDS_API_KEY" ]; then
            echo "::error::Keine Quoten-API konfiguriert. Bitte Repository-Secret ODDSPAPI_API_KEY setzen (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          if [ -z "$ODDSPAPI_API_KEY" ]; then
            echo "Hinweis: ODDSPAPI_API_KEY fehlt — nutze nur THE_ODDS_API_KEY als Fallback."
          else
            echo "OddsPapi-Key vorhanden (Tournament ID: ${ODDSPAPI_TOURNAMENT_ID})."
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate tips for upcoming matches
        if: github.event_name == 'schedule' || inputs.kicktipp_spieltag == ''
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ -z "${{ inputs.round }}" ]; then
            python run.py --all-rounds --skip-started --no-site
          else
            python run.py --round "${{ inputs.round }}" --skip-started --no-site
          fi

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install kicktipp-agent CLI
        run: |
          git clone --depth 1 --branch v1.0.0 https://github.com/christianheidorn/kicktipp-agent.git .kicktipp-agent
          python scripts/patch_kicktipp_agent.py .kicktipp-agent
          cd .kicktipp-agent
          npm install
          npm run build
          npx playwright install chromium --with-deps

      - name: Validate Kicktipp secrets
        id: kicktipp
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
        run: |
          missing=0
          for name in KICKTIPP_EMAIL KICKTIPP_PASSWORD KICKTIPP_COMMUNITY; do
            if [ -z "${!name}" ]; then
              echo "::warning::Repository-Secret $name fehlt — Track record / Kicktipp-Abgabe eingeschränkt."
              missing=1
            fi
          done
          if [ $missing -eq 0 ]; then
            echo "configured=true" >> "$GITHUB_OUTPUT"
          else
            echo "configured=false" >> "$GITHUB_OUTPUT"
          fi
          if [ "${{ github.event_name }}" = "schedule" ] && [ $missing -eq 1 ]; then
            echo "::error::Automatischer Kicktipp-Lauf braucht KICKTIPP_* Secrets."
            exit 1
          fi
          if [ "${{ inputs.submit_kicktipp }}" = "true" ] && [ $missing -eq 1 ]; then
            echo "::error::Kicktipp-Abgabe angefordert, aber KICKTIPP_* Secrets fehlen."
            exit 1
          fi

      - name: Fetch results from Kicktipp
        if: steps.kicktipp.outputs.configured == 'true'
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
          KICKTIPP_LOCALE: de
        run: python scripts/fetch_results.py --matchdays 1-18

      - name: Submit tips to Kicktipp
        if: github.event_name == 'schedule' || inputs.submit_kicktipp == true
        continue-on-error: true
        id: kicktipp_submit
        env:
          KICKTIPP_EMAIL: ${{ secrets.KICKTIPP_EMAIL }}
          KICKTIPP_PASSWORD: ${{ secrets.KICKTIPP_PASSWORD }}
          KICKTIPP_COMMUNITY: ${{ secrets.KICKTIPP_COMMUNITY }}
          KICKTIPP_LOCALE: de
          KICKTIPP_BIN: ${{ github.workspace }}/.kicktipp-agent/dist/index.js
          KICKTIPP_AGENT_ROOT: ${{ github.workspace }}/.kicktipp-agent
        run: |
          if [ -n "${{ inputs.kicktipp_spieltag }}" ]; then
            KT="${{ inputs.kicktipp_spieltag }}"
          else
            KT=$(python scripts/submit_kicktipp.py --print-upcoming-spieltag)
          fi
          if [ -z "$KT" ]; then
            python scripts/submit_kicktipp.py --record-kicktipp-skipped
            echo "Kein anstehender Kicktipp-Spieltag — Übergabe übersprungen."
            exit 0
          fi
          echo "Kicktipp-Spieltag: $KT"
          python scripts/submit_kicktipp.py --no-bonus --kicktipp-spieltag "$KT"

      - name: Warn if Kicktipp submit failed
        if: steps.kicktipp_submit.outcome == 'failure'
        run: echo "::warning::Kicktipp-Übertragung fehlgeschlagen — Status steht in state/sync_status.json."

      - name: Rebuild site
        run: python run.py --build-site

      - name: Commit updated site and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MSG="Auto-update Kicktipp $(TZ=Europe/Berlin date +%d.%m.)"
          else
            MSG="Update predictions $(TZ=Europe/Berlin date +%d.%m.)"
          fi
          git commit -m "$MSG"
          git pull --rebase origin main
          git push

name: Update predictions

on:
  workflow_dispatch:
    inputs:
      round:
        description: 'Spieltag/Runde, z. B. "Matchday 1". Empty = Matchday 1'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
      ODDSPAPI_TOURNAMENT_ID: ${{ secrets.ODDSPAPI_TOURNAMENT_ID != '' && secrets.ODDSPAPI_TOURNAMENT_ID || '16' }}
      ODDSPAPI_BOOKMAKER: pinnacle
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate API secrets
        run: |
          if [ -z "$ODDSPAPI_API_KEY" ] && [ -z "$THE_ODDS_API_KEY" ]; then
            echo "::error::Keine Quoten-API konfiguriert. Bitte Repository-Secret ODDSPAPI_API_KEY setzen (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          if [ -z "$ODDSPAPI_API_KEY" ]; then
            echo "Hinweis: ODDSPAPI_API_KEY fehlt — nutze nur THE_ODDS_API_KEY als Fallback."
          else
            echo "OddsPapi-Key vorhanden (Tournament ID: ${ODDSPAPI_TOURNAMENT_ID})."
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate tips for upcoming matches
        run: |
          ROUND="${{ inputs.round }}"
          if [ -z "$ROUND" ]; then
            ROUND="Matchday 1"
          fi
          python run.py --round "$ROUND" --skip-started

      - name: Commit updated site and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          git commit -m "Update predictions $(TZ=Europe/Berlin date +%d.%m.)"
          git push

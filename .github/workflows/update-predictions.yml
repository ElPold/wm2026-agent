name: Update predictions

on:
  # Cron deaktiviert — nur noch manueller Start
  workflow_dispatch:
    inputs:
      round:
        description: 'Einzelne Runde, z. B. "Matchday 1". Leer = alle Runden (--all-rounds)'
        required: false
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    env:
      ODDSPAPI_API_KEY: ${{ secrets.ODDSPAPI_API_KEY }}
      ODDSPAPI_TOURNAMENT_ID: ${{ secrets.ODDSPAPI_TOURNAMENT_ID != '' && secrets.ODDSPAPI_TOURNAMENT_ID || '16' }}
      ODDSPAPI_BOOKMAKER: pinnacle
      THE_ODDS_API_KEY: ${{ secrets.THE_ODDS_API_KEY }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Validate API secrets
        run: |
          if [ -z "$ODDSPAPI_API_KEY" ] && [ -z "$THE_ODDS_API_KEY" ]; then
            echo "::error::Keine Quoten-API konfiguriert. Bitte THE_ODDS_API_KEY setzen (Settings → Secrets and variables → Actions)."
            exit 1
          fi
          if [ -z "$ODDSPAPI_API_KEY" ]; then
            echo "Nutze THE_ODDS_API_KEY als Quotenquelle."
          elif [ -z "$THE_ODDS_API_KEY" ]; then
            echo "OddsPapi-Key vorhanden (Tournament ID: ${ODDSPAPI_TOURNAMENT_ID})."
          else
            echo "OddsPapi + The Odds API konfiguriert (Fallback)."
          fi

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate tips for upcoming matches
        id: generate_tips
        continue-on-error: true
        run: |
          if [ "${{ github.event_name }}" = "schedule" ] || [ -z "${{ inputs.round }}" ]; then
            python run.py --all-rounds --skip-started --no-site
          else
            python run.py --round "${{ inputs.round }}" --skip-started --no-site
          fi

      - name: Warn if tip generation failed
        if: steps.generate_tips.outcome == 'failure'
        run: echo "::warning::Tipp-Generierung fehlgeschlagen — Website wird trotzdem neu gebaut."

      - name: Rebuild site
        run: python run.py --build-site

      - name: Commit updated site and state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          if [ "${{ github.event_name }}" = "schedule" ]; then
            MSG="Auto-update predictions $(TZ=Europe/Berlin date +%d.%m.)"
          else
            MSG="Update predictions $(TZ=Europe/Berlin date +%d.%m.)"
          fi
          git commit -m "$MSG"
          git pull --rebase origin main
          git push

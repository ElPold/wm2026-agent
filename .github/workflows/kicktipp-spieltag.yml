name: Kicktipp Spieltag

on:
  workflow_dispatch:
    inputs:
      spieltag:
        description: "DEAKTIVIERT — Tipps manuell auf kicktipp.de eintragen"
        required: true
        type: string
        default: "1"

permissions:
  contents: read

jobs:
  submit:
    runs-on: ubuntu-latest
    steps:
      - name: Kicktipp-Übertragung deaktiviert
        run: |
          echo "::error::Automatische Kicktipp-Übertragung ist deaktiviert."
          echo "Tipps bitte manuell auf https://www.kicktipp.de eintragen."
          exit 1
